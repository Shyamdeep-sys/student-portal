<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C7 Student Entrance</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .student-auth-container {
            max-width: 420px;
            width: 100%;
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
        }
        .student-auth-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--primary-grad);
            border-top-left-radius: var(--radius-md);
            border-top-right-radius: var(--radius-md);
        }
        .student-logo {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .input-glow-wrapper {
            position: relative;
            margin: 2rem 0 1.5rem;
        }
        .c7-input {
            width: 100%;
            padding: 1.1rem 1.25rem;
            background: rgba(10, 15, 29, 0.7);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: #ffffff;
            font-family: var(--font-outfit);
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: var(--transition);
        }
        .c7-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--shadow-glow);
            background: rgba(10, 15, 29, 0.95);
        }
        .c7-input::placeholder {
            letter-spacing: normal;
            font-size: 0.95rem;
            color: var(--text-muted);
            text-transform: none;
        }
        .info-card {
            background: rgba(0, 198, 251, 0.05);
            border: 1px solid rgba(0, 198, 251, 0.15);
            border-radius: var(--radius-sm);
            padding: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: left;
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }
        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            gap: 0.25rem;
        }
        .back-link:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="student-auth-container glass-panel animate-fade-in">
        <div class="student-logo">📖</div>
        <h2 style="font-size: 1.8rem; background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.25rem;">C7 Student Portal</h2>
        <p style="font-size: 0.85rem; color: var(--text-muted);">Enter your official C7 series student Roll Number.</p>

        <form id="form-student-login">
            <div class="input-glow-wrapper">
                <input type="text" id="student-roll" class="c7-input" placeholder="e.g. 24C71A05I8" autocomplete="off" required>
            </div>

            <div class="info-card">
                <span style="font-size: 1.2rem; color: var(--primary);">💡</span>
                <div>
                    <strong style="color: #ffffff; display: block; margin-bottom: 0.25rem;">C7 Series Requirement</strong>
                    To access academic listings, timetables, and resource files, your student Roll Number must contain the **C7** identifier in its series (e.g. 24<b>C7</b>1A05I8). Other series are ineligible.
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.9rem 1.75rem; font-size: 1rem;">
                Verify & Enter Portal
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </form>

        <a href="/" class="back-link">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Home
        </a>
    </div>

    <!-- TOAST CONTAINER -->
    <div class="toast-container" id="toast-area"></div>

    <script>
        // Global Toast Notification Helper
        function showToast(message, type = 'success') {
            const toastArea = document.getElementById('toast-area');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span>${type === 'success' ? '✅' : '❌'}</span>
                <div>${message}</div>
            `;
            toastArea.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) reverse forwards';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Handle Login Submission
        document.getElementById('form-student-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const rollNumber = document.getElementById('student-roll').value.trim();

            if (!rollNumber) {
                showToast("Please enter your Roll Number.", "danger");
                return;
            }

            try {
                const response = await fetch('/api/student/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rollNumber })
                });
                const result = await response.json();

                if (result.success) {
                    showToast("Login authorized! Fetching academic dashboard...", "success");
                    
                    // Store student session state
                    sessionStorage.setItem('isStudent', 'true');
                    sessionStorage.setItem('studentRoll', result.student.rollNumber);
                    
                    setTimeout(() => {
                        window.location.href = '/student-dashboard';
                    }, 1200);
                } else {
                    showToast(result.message || "Invalid Login.", "danger");
                }
            } catch (err) {
                showToast("Server connection error. Please try again.", "danger");
            }
        });
    </script>
</body>
</html>
